{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Admin Portal - CareSpot</title>
    
    <!-- React Refresh Preamble -->
    <script type="module">
      import RefreshRuntime from 'http://127.0.0.1:5174/@react-refresh'
      RefreshRuntime.injectIntoGlobalHook(window)
      window.$RefreshReg$ = () => {}
      window.$RefreshSig$ = () => (type) => type
      window.__vite_plugin_react_preamble_installed__ = true
    </script>
    <link rel="stylesheet" href="http://127.0.0.1:5174/src/index.css">
    
    <style>
        body { margin: 0; padding: 0; overflow-x: hidden; background: #f1f5f9; }
        #root { display: flex; width: 100vw; min-height: 100vh; }
    </style>
</head>
<body>
    
    <!-- Pass server side errors and csrf token to React via hidden elements -->
    {% if error %}
    <div id="django-error" style="display: none;">{{ error }}</div>
    {% endif %}
    
    <form style="display: none;">
        {% csrf_token %}
    </form>

    <div id="root"></div>

    <script type="module" src="http://127.0.0.1:5174/@vite/client"></script>
    <script type="module" src="http://127.0.0.1:5174/src/main.tsx"></script>

</body>
</html>
