{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title|default:"CareSpot Admin" }}</title>
    
    <!-- React Refresh Preamble -->
    <script type="module">
      import RefreshRuntime from 'http://127.0.0.1:5174/@react-refresh'
      RefreshRuntime.injectIntoGlobalHook(window)
      window.$RefreshReg$ = () => {}
      window.$RefreshSig$ = () => (type) => type
      window.__vite_plugin_react_preamble_installed__ = true
    </script>
    <link rel="stylesheet" href="http://127.0.0.1:5174/src/index.css">
    
    <!-- Original Admin CSS so that table classes work identically -->
    <link rel="stylesheet" href="{% static 'customadmin/css/admin_panel.css' %}">
    
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        body { margin: 0; padding: 0; overflow-x: hidden; background: #f8fafc; font-family: 'Inter', sans-serif; }
        #react-admin-dashboard-root { display: flex; width: 100vw; min-height: 100vh; }
    </style>
</head>
<body>
    
    <script type="application/json" id="adminCoreData">
        {{ admin_data_json|safe }}
    </script>
    <script type="application/json" id="adminCsrfToken">
        "{{ csrf_token }}"
    </script>

    <div id="react-admin-dashboard-root"></div>

    <script type="module" src="http://127.0.0.1:5174/@vite/client"></script>
    <script type="module" src="http://127.0.0.1:5174/src/main.tsx"></script>

</body>
</html>
