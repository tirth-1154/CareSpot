    {% extends "admin/base.html" %}
    {% load static %}

    {% block title %}{{ title }} | CareSpot Admin{% endblock %}

    {% block extrastyle %}
        {{ block.super }}
        <link rel="stylesheet" type="text/css" href="{% static 'admin/css/custom_admin.css' %}">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    {% endblock %}

    {% block branding %}
    <div id="branding">
        <h1 id="site-name" style="display: flex; align-items: center; gap: 12px; margin: 0; line-height: 1;">
            <img src="/media/images/careSpot.png" alt="CareSpot" style="height: 48px; width: auto; object-fit: contain;">
            <div style="display: flex; flex-direction: column;">
                <span style="font-weight: 700; color: var(--primary-color);">CareSpot</span>
                <span style="font-weight: 400; font-size: 0.55em; color: var(--secondary-color); text-transform: uppercase; letter-spacing: 1px; margin-top: -2px;">Hospital Admin</span>
            </div>
        </h1>
    </div>
    {% endblock %}

    {% block nav-global %}
    <div id="user-tools">
        {{ block.super }}
        <a href="{% url 'logout' %}" class="logout-link">Log out</a>
    </div>
    {% endblock %}
