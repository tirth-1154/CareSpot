{% extends 'base.html' %}

{% block title %}Home{% endblock %}
{% block content %}
<br>
<br>
<div class="container">
    <div class="row">
        <div class="col-xl-5 offset-xl-3">


            <div class="login-register-page">
                <!-- Welcome Text -->
                <div class="welcome-text">
                    <h3>We're glad to see you again!</h3>
                    <span>Don't have an account? <a href="{% url 'dRegister' %}">Sign Up!</a></span>
                </div>

                <!-- Form -->
                <form method="post" id="login-form">{% csrf_token %}
                    <div class="input-with-icon-left">
                        <i class="icon-material-baseline-mail-outline"></i>
                        <input type="text" class="input-text with-border" name="emailaddress" id="emailaddress"
                            placeholder="Email Address" required />
                    </div>

                    <div class="input-with-icon-left">
                        <i class="icon-material-outline-lock"></i>
                        <input type="password" class="input-text with-border" name="password" id="password"
                            placeholder="Password" required />
                    </div>
                    <a href="#" class="forgot-password">Forgot Password?</a>
                </form>

                <!-- Button -->
                <input type="submit" class="button full-width button-sliding-icon ripple-effect margin-top-10"
                    form="login-form" name="btnLogin">Log In <i
                        class="icon-material-outline-arrow-right-alt"></i>

                <!-- Social Login -->
                <div class="social-login-separator"><span>or</span></div>
                <div class="social-login-buttons">
                    <button class="facebook-login ripple-effect"><i class="icon-brand-facebook-f"></i> Log In via
                        Facebook</button>
                    <button class="google-login ripple-effect"><i class="icon-brand-google-plus-g"></i> Log In via
                        Google+</button>
                </div>
            </div>

        </div>
    </div>
    {% if msg %}
    <div class="notification error">
        {{msg}}
    </div>
    {% endif %}
</div>
{% endblock %}
