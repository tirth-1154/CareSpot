{% extends 'base.html' %}

{% block title %}Home{% endblock %}
{% block content %}

<div class="container">
    <div class="row">
        <div class="col-xl-12">
            <div class="dashboard-box">
                <div class="headline">
                    <h3><i class="icon-feather-settings"></i> Add Blog</h3>
                </div>
                <div class="content with-padding padding-bottom-0">
                    <form method="post" enctype="multipart/form-data">
                        {% csrf_token %}
                        <div class="row">
                            <div class="col-xl-12">
                                <div class="submit-field">
                                    <label class="margin-bottom-10">Thumbnail</label>
                                    <input class="uploadButton-input" type="file" name="profile" id="upload" accept="image/*" required/>
                                    <label class="uploadButton-button ripple-effect" for="upload">Upload File</label>
                                </div>
                            </div>
                            <div class="col-xl-12">
                                <div class="submit-field">
                                    <label class="margin-bottom-10">Title</label>
                                    <input type="text" class="with-border" name="title">
                                </div>
                            </div>
                            <div class="col-xl-12">
                                <div class="submit-field">
                                    <label class="margin-bottom-10">Description</label>
                                    <textarea class="with-border" name="description"></textarea>
                                </div>
                            </div>
                            <div class="col-xl-12">
                                <input class="button ripple-effect" type="submit" name="btnAddBlog" value="Add Blog">
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
